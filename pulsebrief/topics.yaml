# Topics drive NewsAPI/GDELT queries and local relevance scoring.
#   priority        : 1-5 nudge to importance scoring (higher = more important)
#   max_clusters    : cap on story clusters this topic can contribute to a digest
#   negative_keywords: stories matching these are penalized/dropped
#   source_preferences: outlet names to gently prefer for this topic
topics:
  - name: World News
    priority: 5
    max_clusters: 2
    keywords: [world news, international, geopolitics, foreign affairs, global, diplomacy]
    negative_keywords: [celebrity, royal family gossip]
    queries: [world news OR geopolitics OR international]
    source_preferences: [Reuters, BBC, Al Jazeera, Associated Press]

  - name: US News
    priority: 4
    max_clusters: 2
    keywords: [US news, United States, Congress, White House, Supreme Court, American politics]
    negative_keywords: []
    queries: [US news OR Congress OR White House]
    source_preferences: [Associated Press, NPR, Politico, Reuters]

  - name: AI
    priority: 5
    max_clusters: 2
    keywords: [artificial intelligence, machine learning, large language model, OpenAI, Anthropic, generative AI, GPU]
    negative_keywords: []
    queries: [artificial intelligence OR machine learning OR LLM]
    source_preferences: [The Verge, TechCrunch, Ars Technica]

  - name: Tech
    priority: 3
    max_clusters: 2
    keywords: [technology, big tech, software, chips, semiconductors, gadgets, cloud]
    negative_keywords: []
    queries: [technology OR big tech OR software]
    source_preferences: [The Verge, TechCrunch, Ars Technica, Wired]

  - name: Cybersecurity
    priority: 4
    max_clusters: 2
    keywords: [cybersecurity, data breach, ransomware, vulnerability, exploit, hack, CVE, malware]
    negative_keywords: []
    queries: [cybersecurity OR data breach OR ransomware OR vulnerability]
    source_preferences: [BleepingComputer, The Hacker News, CISA]

  - name: Finance
    priority: 4
    max_clusters: 2
    keywords: [finance, economy, inflation, Federal Reserve, interest rates, central bank, recession]
    negative_keywords: []
    queries: [finance OR economy OR inflation OR Federal Reserve]
    source_preferences: [Bloomberg, Financial Times, Reuters, CNBC]

  - name: Markets
    priority: 3
    max_clusters: 1
    keywords: [stock market, Wall Street, S&P 500, Nasdaq, earnings, IPO, bonds]
    negative_keywords: []
    queries: [stock market OR Wall Street OR Nasdaq OR earnings]
    source_preferences: [Bloomberg, CNBC, MarketWatch]

  - name: Startups
    priority: 2
    max_clusters: 1
    keywords: [startup, venture capital, funding round, unicorn, seed round, Series A]
    negative_keywords: []
    queries: [startup OR venture capital OR funding OR IPO]
    source_preferences: [TechCrunch]

  - name: Science
    priority: 3
    max_clusters: 1
    keywords: [research, study, climate, space, NASA, physics, biology, discovery]
    negative_keywords: []
    queries: [scientific study OR research OR climate OR space]
    source_preferences: [NPR, BBC, The Guardian]
