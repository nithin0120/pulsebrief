name: PulseBrief Digest

on:
  schedule:
    # Every 6 hours (UTC). GitHub may delay a few minutes under load.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

jobs:
  digest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pulsebrief
    env:
      DELIVERY_CHANNEL: ntfy
      NTFY_SERVER: https://ntfy.sh
      TIMEZONE: America/Los_Angeles
      MAX_ARTICLES_PER_TOPIC: "3"
      MAX_TOTAL_ARTICLES: "40"
      CANDIDATES_PER_TOPIC: "6"
      MIN_IMPORTANCE: "7"
      GROQ_MODEL: llama-3.3-70b-versatile
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pulsebrief/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        run: python cli.py run-digest
