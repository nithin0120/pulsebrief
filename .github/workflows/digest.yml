name: PulseBrief Digest

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pulsebrief-pages
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: pulsebrief
    env:
      MIN_INTERVAL_HOURS: "6"
      DELIVERY_CHANNEL: ntfy
      NTFY_SERVER: https://ntfy.sh
      TIMEZONE: America/Los_Angeles
      GROQ_MODEL: llama-3.1-8b-instant
      GROQ_DEEP_MODEL: llama-3.3-70b-versatile
      GROQ_MAX_DAILY_REQUESTS: "20"
      GROQ_MAX_TOKENS_PER_DIGEST: "6000"
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      BRIEF_PUBLIC_URL: https://nithin0120.github.io/pulsebrief/brief.html
    steps:
      - uses: actions/checkout@v4

      # Restore the timestamp of the last *real* run. restore-keys matches the
      # newest cache with this prefix, so it always reflects the latest run.
      - name: Restore last-run marker
        uses: actions/cache/restore@v4
        with:
          path: pulsebrief/.lastrun
          key: pulsebrief-lastrun-${{ github.run_id }}
          restore-keys: |
            pulsebrief-lastrun-

      - name: Decide whether to run
        id: decide
        working-directory: ${{ github.workspace }}
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch -> running."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          GRACE=600  # 10-min grace so an hourly tick a touch early still counts
          THRESHOLD=$(( MIN_INTERVAL_HOURS * 3600 - GRACE ))
          NOW=$(date +%s)
          LAST=0
          if [ -f pulsebrief/.lastrun ]; then
            LAST=$(cat pulsebrief/.lastrun 2>/dev/null || echo 0)
          fi
          [ -z "$LAST" ] && LAST=0
          ELAPSED=$(( NOW - LAST ))
          echo "last=$LAST now=$NOW elapsed=${ELAPSED}s threshold=${THRESHOLD}s"
          if [ "$LAST" -eq 0 ] || [ "$ELAPSED" -ge "$THRESHOLD" ]; then
            echo "Enough time since last run -> running."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Only ${ELAPSED}s since last run (< ${THRESHOLD}s) -> skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.decide.outputs.run == 'true'
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pulsebrief/requirements.txt

      - name: Install dependencies
        if: steps.decide.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Run digest
        if: steps.decide.outputs.run == 'true'
        run: python cli.py run

      - name: Setup GitHub Pages
        if: steps.decide.outputs.run == 'true'
        uses: actions/configure-pages@v4

      - name: Upload brief page
        if: steps.decide.outputs.run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: pulsebrief/public

      - name: Deploy brief to GitHub Pages
        if: steps.decide.outputs.run == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      # Record "now" as the last real run, then persist it for the next check.
      - name: Update last-run marker
        if: steps.decide.outputs.run == 'true'
        working-directory: ${{ github.workspace }}
        run: date +%s > pulsebrief/.lastrun

      - name: Save last-run marker
        if: steps.decide.outputs.run == 'true'
        uses: actions/cache/save@v4
        with:
          path: pulsebrief/.lastrun
          key: pulsebrief-lastrun-${{ github.run_id }}
